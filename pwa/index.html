<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0e1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="AI Agent session control room">
  <title>Attention Hub</title>

  <link rel="manifest" href="/attention/manifest.json">

  <!-- IBM Plex Mono — industrial precision typeface -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/attention/styles.css">

  <!-- xterm.js CSS -->
  <link rel="preload" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.min.css"></noscript>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <span class="brand-icon" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="3" fill="currentColor" opacity="0.9"/>
          <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
          <circle cx="10" cy="10" r="9.5" stroke="currentColor" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.2"/>
        </svg>
      </span>
      <span class="brand-text">ATT<span class="brand-accent">HUB</span></span>
    </div>

    <div class="header-right">
      <div class="header-stats" id="header-stats"></div>
      <div id="conn-dot" class="conn-dot disconnected" title="Connection status"></div>
      <button id="btn-settings" class="btn-icon" type="button" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Session strip -->
  <div id="session-strip" class="session-strip"></div>

  <!-- Action queue -->
  <main id="content" class="main main-content action-queue"></main>

  <!-- Toast notification container -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- Preferences panel -->
  <div id="prefs-backdrop" class="prefs-backdrop" aria-hidden="true"></div>
  <aside id="prefs-panel" class="prefs-panel" aria-label="Preferences">
    <div class="prefs-title">Preferences</div>

    <div class="prefs-section">
      <div class="prefs-label">
        <svg class="prefs-label-icon" viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.03-1.97 1.25-5.55 3.67-.53.36-1 .54-1.42.53-.47-.01-1.37-.26-2.03-.48-.82-.27-1.47-.41-1.41-.87.03-.24.37-.49 1.02-.74 3.98-1.73 6.64-2.88 7.97-3.44 3.8-1.58 4.59-1.86 5.1-1.87.11 0 .37.03.53.17.14.12.18.28.2.45-.01.06.01.24 0 .38z"/></svg>
        Telegram
      </div>
      <div class="prefs-hint">Notifications envoyées sur Telegram</div>
      <div class="prefs-row">
        <span class="prefs-row-text">Permission prompts</span>
        <label class="toggle">
          <input type="checkbox" id="pref-permission" checked>
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="prefs-row">
        <span class="prefs-row-text">Question prompts</span>
        <label class="toggle">
          <input type="checkbox" id="pref-question" checked>
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="prefs-row">
        <span class="prefs-row-text">Text input prompts</span>
        <label class="toggle">
          <input type="checkbox" id="pref-text-input" checked>
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>

    <div class="prefs-section">
      <div class="prefs-label">
        <svg class="prefs-label-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        Dashboard
      </div>
      <div class="prefs-hint">Alertes dans cette interface</div>
      <div class="prefs-row">
        <span class="prefs-row-text">Push notifications</span>
        <label class="toggle">
          <input type="checkbox" id="pref-push">
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="prefs-row">
        <span class="prefs-row-text">Sound alerts</span>
        <label class="toggle">
          <input type="checkbox" id="pref-sound">
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="prefs-row">
        <span class="prefs-row-text">Vibration</span>
        <label class="toggle">
          <input type="checkbox" id="pref-vibrate" checked>
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="prefs-row">
        <span class="prefs-row-text">Working sessions</span>
        <label class="toggle">
          <input type="checkbox" id="pref-working">
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="prefs-row">
        <span class="prefs-row-text">Thinking sessions</span>
        <label class="toggle">
          <input type="checkbox" id="pref-thinking" checked>
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>

    <div class="prefs-section">
      <div class="prefs-label">Display</div>
      <div class="prefs-row">
        <span class="prefs-row-text">eInk mode</span>
        <label class="toggle">
          <input type="checkbox" id="pref-eink">
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="prefs-row">
        <span class="prefs-row-text">Auto-scroll terminals</span>
        <label class="toggle">
          <input type="checkbox" id="pref-autoscroll" checked>
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="prefs-row">
        <span class="prefs-row-text">Show idle timers</span>
        <label class="toggle">
          <input type="checkbox" id="pref-idle" checked>
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>
  </aside>

  <!-- Terminal slide-up panel -->
  <div id="terminal-slide" class="terminal-slide" aria-hidden="true">
    <div class="terminal-slide-handle"><span class="terminal-slide-bar"></span></div>
    <div class="terminal-slide-header" id="terminal-slide-header"></div>
    <div class="terminal-slide-body" id="terminal-slide-body"></div>
  </div>

  <!-- xterm.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/lib/xterm.min.js"></script>

  <!-- Application -->
  <script defer src="/attention/terminal.js"></script>
  <script defer src="/attention/app.js"></script>

</body>
</html>
